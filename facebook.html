<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Filtros do Facebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="date"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .calendar-icon {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #667eea;
            font-size: 20px;
            user-select: none;
        }

        .calendar-icon:hover {
            color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-copy {
            background: #4CAF50;
            color: white;
        }

        .btn-copy:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-container {
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 120px;
            background: #f9f9f9;
        }

        .error {
            color: #f44336;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de Filtros do Facebook</h1>
        
        <div class="form-group">
            <label for="startDate">Data de Início (DD/MM/AAAA):</label>
            <div class="input-wrapper">
                <input type="text" id="startDate" maxlength="10" placeholder="Ex: 01/01/2024">
                <input type="date" id="startDatePicker">
                <span class="calendar-icon" onclick="document.getElementById('startDatePicker').showPicker()">📅</span>
            </div>
            <div class="error" id="startDateError">Formato de data inválido</div>
        </div>

        <div class="form-group">
            <label for="endDate">Data de Fim (DD/MM/AAAA):</label>
            <div class="input-wrapper">
                <input type="text" id="endDate" maxlength="10" placeholder="Ex: 31/12/2024">
                <input type="date" id="endDatePicker">
                <span class="calendar-icon" onclick="document.getElementById('endDatePicker').showPicker()">📅</span>
            </div>
            <div class="error" id="endDateError">Formato de data inválido</div>
        </div>

        <div class="form-group">
            <label for="search">Pesquisar por:</label>
            <input type="text" id="search" placeholder="Digite o termo de pesquisa">
        </div>

        <button class="btn btn-generate" onclick="generateFilter()">Gerar Busca</button>

        <div class="result-container">
            <textarea id="result" readonly placeholder="O link gerado aparecerá aqui..."></textarea>
            <button class="btn btn-copy" onclick="copyFilter()" id="copyBtn" disabled>Copiar</button>
            <div class="success" id="successMsg">Link copiado para a área de transferência!</div>
        </div>
    </div>

    <script>
        let generatedFilter = '';

        function encodeBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        function formatDate(input, nextInput) {
            let value = input.value.replace(/\D/g, '');
            
            if (value.length > 8) {
                value = value.substring(0, 8);
            }

            if (value.length >= 5) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4) + '/' + value.substring(4);
            } else if (value.length >= 3) {
                value = value.substring(0, 2) + '/' + value.substring(2);
            }

            input.value = value;

            if (value.length === 10 && nextInput) {
                nextInput.focus();
            }
        }

        document.getElementById('startDate').addEventListener('input', function(e) {
            formatDate(this, document.getElementById('endDate'));
        });

        document.getElementById('endDate').addEventListener('input', function(e) {
            formatDate(this, document.getElementById('search'));
        });

        document.getElementById('startDatePicker').addEventListener('change', function() {
            const [year, month, day] = this.value.split('-');
            document.getElementById('startDate').value = `${day}/${month}/${year}`;
        });

        document.getElementById('endDatePicker').addEventListener('change', function() {
            const [year, month, day] = this.value.split('-');
            document.getElementById('endDate').value = `${day}/${month}/${year}`;
        });

        function validateDate(dateStr) {
            const regex = /^\d{2}\/\d{2}\/\d{4}$/;
            if (!regex.test(dateStr)) return false;

            const parts = dateStr.split('/');
            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10);

            if (month < 1 || month > 12) return false;
            if (day < 1 || day > 31) return false;
            if (year < 1900 || year > 2100) return false;

            return true;
        }

        function generateFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const search = document.getElementById('search').value;

            document.getElementById('startDateError').style.display = 'none';
            document.getElementById('endDateError').style.display = 'none';

            if (!validateDate(startDate)) {
                document.getElementById('startDateError').style.display = 'block';
                return;
            }

            if (!validateDate(endDate)) {
                document.getElementById('endDateError').style.display = 'block';
                return;
            }

            const [startDay, startMonth, startYear] = startDate.split('/');
            const [endDay, endMonth, endYear] = endDate.split('/');
            const searchEncoded = search.toLowerCase().trim().replace(/ /g, '%20');

            const filter = '{"rp_creation_time:0":"{\\"name\\":\\"creation_time\\",\\"args\\":\\"{\\\\\\"start_year\\\\\\":\\\\\\"' + startYear + '\\\\\\",\\\\\\"start_month\\\\\\":\\\\\\"' + startYear + '-' + startMonth + '\\\\\\",\\\\\\"end_year\\\\\\":\\\\\\"' + endYear + '\\\\\\",\\\\\\"end_month\\\\\\":\\\\\\"' + endYear + '-' + endMonth + '\\\\\\",\\\\\\"start_day\\\\\\":\\\\\\"' + startYear + '-' + startMonth + '-' + startDay + '\\\\\\",\\\\\\"end_day\\\\\\":\\\\\\"' + endYear + '-' + endMonth + '-' + endDay + '\\\\\\"}\\"}"}';

            const encodedFilter = encodeBase64(filter);
            const filterUrl = `https://facebook.com/search/posts/?q=${searchEncoded}&filters=${encodedFilter}`;

            generatedFilter = filterUrl;
            document.getElementById('result').value = filterUrl;
            document.getElementById('copyBtn').disabled = false;
        }

        function copyFilter() {
            const resultTextarea = document.getElementById('result');
            resultTextarea.select();
            resultTextarea.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(generatedFilter).then(() => {
                const successMsg = document.getElementById('successMsg');
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 2000);
            });
        }

        document.getElementById('startDate').focus();
    </script>
</body>
</html>
