<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Escolha de Página</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 400px;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 500;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            background: #3b82f6;
            color: white;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59,130,246,0.4);
        }

        button.secondary {
            background: #10b981;
        }

        button.secondary:hover {
            background: #059669;
            box-shadow: 0 5px 15px rgba(16,185,129,0.4);
        }

        button.tertiary {
            background: #f59e0b;
        }

        button.tertiary:hover {
            background: #d97706;
            box-shadow: 0 5px 15px rgba(245,158,11,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="buttons">
            <button onclick="location.href='facebook.html'">
                Buscas Facebook
            </button>

            <button class="secondary" onclick="location.href='duplicate-check.html'">
                Checar duplicatas
            </button>

            <button class="tertiary" onclick="location.href='boolean-generator.html'">
                Gerador de booleanas (experimental)
            </button>
        </div>
    </div>
</body>
</html>
